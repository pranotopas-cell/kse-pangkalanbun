<script>
    const SB_URL = "https://yqdtgcjpfhiskywhowhu.supabase.co"; 
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxZHRnY2pwZmhpc2t5d2hvd2h1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1MDY0MTIsImV4cCI6MjA4NzA4MjQxMn0.Mlw3e8C4xKHcJPSMRkcsRXL5udtR9SeWk2GmqM1NyYc";
    const _supabase = supabase.createClient(SB_URL, SB_KEY);
    const monthRomawi = ["I", "II", "III", "IV", "V", "VI", "VII", "VIII", "IX", "X", "XI", "XII"];
    const monthsIndo = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

    function formatIDR(val) {
        return parseFloat(val).toLocaleString('id-ID', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function roundPrice(num) {
        return Math.round(num * 100) / 100;
    }

    function calculateFromBasic() {
        const qtyRaw = document.getElementById('in_qty_text').value.replace(/\./g, '').replace(',', '.');
        const hNettRaw = document.getElementById('in_h_nett_text').value.replace(/\./g, '').replace(',', '.');
        const qty = parseFloat(qtyRaw) || 0;
        const hNett = parseFloat(hNettRaw) || 0;
        
        const hTax = roundPrice(hNett / 1.11); 
        const subtotal = qty * hTax;

        document.getElementById('in_h_tax_text').value = hTax.toFixed(2).replace('.', ',');
        document.getElementById('in_subtotal').value = subtotal.toFixed(2);
        syncAll();
    }

    function calculateFromDPPUnit() {
        const qtyRaw = document.getElementById('in_qty_text').value.replace(/\./g, '').replace(',', '.');
        const dppUnitRaw = document.getElementById('in_h_tax_text').value.replace(/\./g, '').replace(',', '.');
        const qty = parseFloat(qtyRaw) || 0;
        const dppUnit = parseFloat(dppUnitRaw) || 0;

        const subtotal = qty * dppUnit;
        document.getElementById('in_subtotal').value = subtotal.toFixed(2);
        syncAll();
    }

    function syncAll() {
        document.getElementById('out_no').innerText = document.getElementById('in_no').value;
        document.getElementById('out_cust').innerText = document.getElementById('in_cust').value;
        document.getElementById('out_addr').innerText = document.getElementById('in_addr').value;
        document.getElementById('out_po_no').innerText = document.getElementById('in_po_no').value;
        document.getElementById('out_po_tgl').innerText = document.getElementById('in_po_tgl').value;
        document.getElementById('out_produk').innerText = document.getElementById('in_produk').value;
        document.getElementById('out_qty_val').innerText = document.getElementById('in_qty_text').value + " Ltr";
        document.getElementById('out_h_nett_val').innerText = formatIDR(document.getElementById('in_h_nett_text').value.replace(/\./g, '').replace(',', '.') || 0);
        
        const dppUnitVal = parseFloat(document.getElementById('in_h_tax_text').value.replace(',', '.')) || 0;
        document.getElementById('out_h_tax_val').innerText = formatIDR(dppUnitVal);

        const sub = parseFloat(document.getElementById('in_subtotal').value) || 0;
        const adj = parseFloat(document.getElementById('in_adjust').value) || 0;
        
        // Logika Pajak & Total Baru
        const dppLain = sub * (11 / 12);
        const ppn = dppLain * 0.12;
        
        // Grand Total = Sub Total + PPN + Penyesuaian
        const grand = sub + ppn + adj;

        document.getElementById('out_subtotal_top').innerText = formatIDR(sub);
        document.getElementById('out_subtotal_display').innerText = formatIDR(sub);
        document.getElementById('out_dpp_val').innerText = formatIDR(dppLain);
        document.getElementById('out_ppn_val').innerText = formatIDR(ppn);
        document.getElementById('out_adjust_val').innerText = formatIDR(adj);
        document.getElementById('out_grand_val').innerText = formatIDR(grand);
        document.getElementById('out_terbilang').innerText = grand != 0 ? terbilang(Math.round(grand)) + " Rupiah" : "-";
        updateQRCode(grand);
    }

    function autoFillCustomer() {
        const custValue = document.getElementById('in_cust').value;
        const addrField = document.getElementById('in_addr');
        const daftarAlamat = {
            "CV. SAMI JAYA": "Jl. HM Arsyad No.05 Sampit",
            "PT. PELAYARAN JASA SAMUDRA SHIPPING": "Jl. Gatot Subroto No.15 Pangkalan Bun",
            "PT. EXPLOITASI ENERGI INDONESIA, Tbk": "Jl. Rungun RT.10 Desa Pasir Panjang",
            "PT. JAYA ABADI": "Jl. Merdeka No. 45"        
        };
        if (daftarAlamat[custValue]) addrField.value = daftarAlamat[custValue];
        syncAll();
    }

    async function initAutoNumber(selectedDate = new Date()) {
        try {
            const { count, error } = await _supabase.from('eforms').select('*', { count: 'exact', head: true }).eq('jenis', 'INVOICE');
            if (error) throw error;
            const nextNum = (count || 0) + 1;
            const m = selectedDate.getMonth();
            const y = selectedDate.getFullYear();
            const newNo = `${nextNum.toString().padStart(3, '0')} / INV-KSE / ${monthRomawi[m]} / ${y}`;
            document.getElementById('in_no').value = newNo;
            syncAll();
        } catch (err) { console.error(err); }
    }

    function handleDateChange() {
        const val = document.getElementById('in_tgl_raw').value;
        if (!val) return;
        const d = new Date(val);
        document.getElementById('out_tgl').innerText = `${d.getDate()} ${monthsIndo[d.getMonth()]} ${d.getFullYear()}`;
        initAutoNumber(d);
    }

    function updateQRCode(grandTotal) {
        const noInv = document.getElementById('in_no').value;
        const customer = document.getElementById('in_cust').value;
        const qrContent = `KSE-INV|NO:${noInv}|CUST:${customer}|TOTAL:Rp${formatIDR(grandTotal)}`;
        document.getElementById('qr_footer').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(qrContent)}`;
        document.getElementById('qr_timestamp').innerText = `Generated: ${new Date().toLocaleString('id-ID')}`;
    }

    async function saveToSupabase() {
        const btn = document.getElementById('btn-save-sb');
        btn.innerText = "SAVING..."; btn.disabled = true;
        try {
            const payload = {
                jenis: "INVOICE", 
                nomor: document.getElementById('in_no').value,
                tanggal: document.getElementById('in_tgl_raw').value,
                tujuan: document.getElementById('in_cust').value,
                nominal: parseFloat(document.getElementById('out_grand_val').innerText.replace(/\./g, '').replace(',', '.')),
                client_email: "system@kse.co.id"
            };
            const { error } = await _supabase.from('eforms').insert([payload]);
            if (error) throw error;
            alert("Berhasil Disimpan!");
        } catch (e) { alert("Error: " + e.message); }
        btn.innerHTML = '<i class="bi bi-cloud-arrow-up"></i> SIMPAN DATA'; btn.disabled = false;
    }

    function downloadPDF() {
        const element = document.getElementById('main-doc');
        html2pdf().set({ 
            margin: 0, filename: `INV-${document.getElementById('in_no').value}.pdf`, 
            html2canvas: { scale: 2, useCORS: true }, 
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
        }).from(element).save();
    }

    function terbilang(a) {
        if (a < 0) return "Minus " + terbilang(Math.abs(a));
        var bil = ["", "Satu", "Dua", "Tiga", "Empat", "Lima", "Enam", "Tujuh", "Delapan", "Sembilan", "Sepuluh", "Sebelas"];
        if (a < 12) return bil[a];
        if (a < 20) return terbilang(a - 10) + " Belas";
        if (a < 100) return terbilang(Math.floor(a / 10)) + " Puluh " + terbilang(a % 10);
        if (a < 200) return " Seratus " + terbilang(a - 100);
        if (a < 1000) return terbilang(Math.floor(a / 100)) + " Ratus " + terbilang(a % 100);
        if (a < 2000) return " Seribu " + terbilang(a - 1000);
        if (a < 1000000) return terbilang(Math.floor(a / 1000)) + " Ribu " + terbilang(a % 1000);
        if (a < 1000000000) return terbilang(Math.floor(a / 1000000)) + " Juta " + terbilang(a % 1000000);
        return "";
    }

    window.onload = () => {
        const now = new Date();
        document.getElementById('in_tgl_raw').value = now.toISOString().split('T')[0];
        handleDateChange();
        document.getElementById('in_produk').value = "BBM SOLAR INDUSTRI (HSD)";
        document.getElementById('in_qty_text').value = "5.000";
        calculateFromBasic();
    };
</script>
